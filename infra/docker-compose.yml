# Web Ranking Reports — MVP stack
# From repo root (recommended — use absolute paths + project dir so env_file paths always resolve):
#   docker compose --project-directory "$PWD/infra" --env-file "$PWD/infra/.env" -f "$PWD/infra/docker-compose.yml" up -d
# Put secrets in infra/.env (SMTP_USER, SMTP_PASSWORD, PB_*, STATE_SIGNING_SECRET, …).

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - WEBRANKINGREPORTS_DOMAIN=${WEBRANKINGREPORTS_DOMAIN:-webrankingreports.com}
      - POCKETBASE_SUBDOMAIN=${POCKETBASE_SUBDOMAIN:-pb}
    depends_on:
      - web
      - pb

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
      args:
        - NUXT_PUBLIC_POCKETBASE_URL=${NUXT_PUBLIC_POCKETBASE_URL:-https://pb.webrankingreports.com}
        - APP_URL=${APP_URL:-https://webrankingreports.com}
    image: web-ranking-reports-web
    restart: unless-stopped
    # Paths are relative to this file’s directory (infra/). Order: repo .env then infra/.env — same key → later wins.
    # Do not list SMTP_* (or duplicate PB_*/STATE_* below): empty `environment:` values override env_file per Compose spec.
    env_file:
      - ../.env
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - NODE_ENV=production
      - NUXT_PUBLIC_POCKETBASE_URL=${NUXT_PUBLIC_POCKETBASE_URL:-https://pb.webrankingreports.com}
      - APP_URL=${APP_URL:-https://webrankingreports.com}
      - NUXT_PUBLIC_APP_URL=${APP_URL:-https://webrankingreports.com}
      - PB_URL=${PB_URL:-http://pb:8090}
      # PB_*, ADMIN_EMAILS, STATE_SIGNING_SECRET: from env_file only (see header — avoid empty ${VAR} overriding the file).
      # Nuxt runtimeConfig in production only reads NUXT_* prefixed vars
      - NUXT_PB_URL=${PB_URL:-http://pb:8090}
      - NUXT_PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL}
      - NUXT_PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD}
      - NUXT_ADMIN_EMAILS=${ADMIN_EMAILS}
      - NUXT_STATE_SIGNING_SECRET=${STATE_SIGNING_SECRET}
      - INVITE_PASSWORD_TOKEN_SECRET=${INVITE_PASSWORD_TOKEN_SECRET:-}
      - NUXT_INVITE_PASSWORD_TOKEN_SECRET=${INVITE_PASSWORD_TOKEN_SECRET:-}
      # SMTP_*, PAGESPEED_API_KEY, NUXT_PUBLIC_WOOCOMMERCE_ENABLED: set in env_file (infra/.env), not here —
      # empty ${VAR:-} here would override env_file and break mail.
      # Weekly automated rank refresh (Friday 00:00 in RANK_TRACKING_CRON_TZ)
      - RANK_TRACKING_WEEKLY_CRON_ENABLED=${RANK_TRACKING_WEEKLY_CRON_ENABLED:-true}
      - RANK_TRACKING_CRON_TZ=${RANK_TRACKING_CRON_TZ:-America/Chicago}
      - RANK_TRACKING_CRON_EXPRESSION=${RANK_TRACKING_CRON_EXPRESSION:-0 0 * * 5}
    expose:
      - "3000"
    # Expose 3000 on host so you can curl http://localhost:3000/api/... from the VPS (e.g. health/debug)
    ports:
      - "3000:3000"

  pb:
    build:
      context: .
      dockerfile: Dockerfile.pb
    restart: unless-stopped
    volumes:
      - pb_data:/pb_data
    environment:
      - POCKETBASE_DEBUG=0
    expose:
      - "8090"

volumes:
  caddy_data:
  caddy_config:
  pb_data:
